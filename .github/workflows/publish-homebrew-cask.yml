name: Publish Homebrew Cask

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., v1.0.8)'
        required: true
        default: 'v1.0.8'

permissions:
  contents: read

jobs:
  resolve-tag:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
    steps:
      - name: Get Tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG=$(curl -fsSL https://api.github.com/repos/choihunchul/codex-menu-bar/releases/latest | jq -r .tag_name)
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  publish:
    needs: resolve-tag
    uses: choihunchul/github--actions/.github/workflows/publish-homebrew-cask.yml@main
    with:
      repository: 'choihunchul/codex-menu-bar'
      cask: 'codex-menu-bar'
      asset: 'CodexMenuBar.dmg'
      app: 'CodexMenuBar.app'
      tag: ${{ needs.resolve-tag.outputs.tag }}
      verify-tag: false
    secrets:
      token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
