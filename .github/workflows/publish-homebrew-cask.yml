name: Publish Homebrew Cask

on:
  workflow_run:
    workflows: ["Build and Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g., v1.0.8)'
        required: true
        default: 'v1.0.8'

permissions:
  contents: read

jobs:
  call-reusable-workflow:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    uses: choihunchul/github--actions/.github/workflows/publish-homebrew-cask.yml@main
    with:
      repository: 'choihunchul/codex-menu-bar'
      cask_name: 'codex-menu-bar'
      cask_display_name: 'Codex Menu Bar'
      cask_desc: 'Local Codex, Cursor, and Antigravity plugin macOS companion app'
      cask_homepage: 'https://github.com/choihunchul/codex-menu-bar'
      cask_app: 'CodexMenuBar.app'
      download_url_template: 'https://github.com/choihunchul/codex-menu-bar/releases/download/{tag}/CodexMenuBar.dmg'
      tag: ${{ github.event.inputs.tag }}
    secrets:
      token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
